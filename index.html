<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>月面サーバー防衛戦 - 和風サイバー・タクティクス</title>
<style>
  /* ==========================================
     和風サイバーテーマ・ベーススタイル
  ========================================== */
  body { 
    font-family: 'Courier New', 'Hiragino Kaku Gothic ProN', monospace; 
    user-select: none; 
    background-color: #050508; 
    background-image: 
      linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 20px 20px;
    color: #e0f7fa; 
    margin: 0; padding: 20px; 
    display: flex; justify-content: center; align-items: center; min-height: 100vh; 
  }
  
  #app-container { 
    position: relative; background: rgba(10, 10, 20, 0.9); padding: 20px 30px; 
    border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); 
    border: 1px solid #00bcd4; width: 440px; display: flex; flex-direction: column; 
    align-items: center; min-height: 600px;
  }
  
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
  .screen.active { display: flex; }
  
  h1 { font-size: 30px; color: #00e5ff; margin-bottom: 20px; letter-spacing: 4px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.8); border-bottom: 1px solid #00e5ff; padding-bottom: 10px; text-align: center;}
  h2 { color: #18ffff; margin-top: 0; margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px dashed #00bcd4; padding-bottom: 5px; font-size: 18px; text-shadow: 0 0 5px rgba(24, 255, 255, 0.5);}
  
  .subtitle { color: #b2ebf2; font-size: 12px; margin-bottom: 30px; text-align: center; line-height: 1.5; }

  .big-btn { background: rgba(0, 188, 212, 0.1); color: #00e5ff; font-size: 18px; padding: 12px 30px; border-radius: 4px; border: 1px solid #00e5ff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); cursor: pointer; transition: 0.2s; font-family: inherit; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;}
  .big-btn:hover { background: rgba(0, 229, 255, 0.3); box-shadow: 0 0 20px rgba(0, 229, 255, 0.6); }
  .big-btn:disabled { border-color: #555; color: #555; box-shadow: none; cursor: not-allowed; background: transparent; }

  /* ==========================================
     デッキ編成 (プログラムインストール)
  ========================================== */
  #deck-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; max-height: 380px; overflow-y: auto; padding: 5px;}
  .deck-card { width: 120px; border: 1px solid #006064; border-radius: 4px; padding: 8px; cursor: pointer; text-align: center; background: rgba(0, 0, 0, 0.6); transition: 0.2s; position: relative; color: #b2ebf2;}
  .deck-card:hover { border-color: #00e5ff; background: rgba(0, 188, 212, 0.2); }
  .deck-card.selected { border-color: #18ffff; background: rgba(0, 229, 255, 0.2); transform: scale(1.05); box-shadow: 0 0 15px rgba(24, 255, 255, 0.5); }
  .deck-card.disabled { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
  .dc-name { font-weight: bold; font-size: 13px; margin-bottom: 4px; color: #fff;}
  .dc-type { font-size: 10px; color: #4dd0e1; margin-bottom: 4px; }
  .dc-type.tensho { color: #ff4081; font-weight: bold; text-shadow: 0 0 5px rgba(255, 64, 129, 0.8);}
  .dc-stats { font-size: 10px; margin-bottom: 4px; }
  .dc-cost { font-size: 10px; font-weight: bold; color: #000; background: #00e5ff; border-radius: 2px; display: inline-block; padding: 2px 6px;}

  #deck-warning { color: #ff1744; font-size: 12px; font-weight: bold; min-height: 18px; margin-bottom: 10px; text-shadow: 0 0 5px red;}

  /* ==========================================
     バトル画面 (サイバーボード)
  ========================================== */
  #board { display: grid; grid-template-columns: repeat(7, 50px); gap: 2px; background-color: rgba(0, 0, 0, 0.8); padding: 6px; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); border: 1px solid #00bcd4; }
  .cell { width: 50px; height: 50px; background-color: rgba(0, 188, 212, 0.05); border: 1px solid rgba(0, 229, 255, 0.2); display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; transition: 0.2s; }
  .cell:hover { background-color: rgba(0, 229, 255, 0.2); border-color: #00e5ff; }

  /* ターゲット予約のオーバーレイ（サイバー風） */
  .cell.move-target::after { content: "MOVE"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 169, 244, 0.2); border: 2px solid #03a9f4; box-sizing: border-box; z-index: 20; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; color: #81d4fa; text-shadow: 0 0 3px #03a9f4;}
  .cell.attack-target::after { content: "EXEC"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 23, 68, 0.2); border: 2px solid #ff1744; box-sizing: border-box; z-index: 20; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; color: #ff8a80; text-shadow: 0 0 3px #ff1744;}
  .cell.summon-target::after { content: "DEPLOY"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(213, 0, 249, 0.2); border: 2px solid #d500f9; box-sizing: border-box; z-index: 20; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 9px; font-weight: bold; color: #ea80fc; text-shadow: 0 0 3px #d500f9;}

  /* ユニット（ホログラムプログラム） */
  .shikigami { width: 44px; height: 44px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; font-size: 10px; font-weight: bold; pointer-events: none; z-index: 10; background-color: rgba(0, 0, 0, 0.8); color: #fff; position: relative; transition: all 0.3s; border-radius: 2px; }
  .u-name { font-size: 9px; letter-spacing: 0px; text-transform: uppercase;}
  .u-stats { font-size: 9px; display: flex; gap: 2px; }

  /* プレイヤー=Admin(青系), エネミー=Virus(赤系) */
  .player { border: 1px solid #00e5ff; box-shadow: inset 0 0 8px rgba(0,229,255,0.4), 0 0 5px rgba(0,229,255,0.5); }
  .enemy { border: 1px solid #ff1744; box-shadow: inset 0 0 8px rgba(255,23,68,0.4), 0 0 5px rgba(255,23,68,0.5); }
  
  .leader { border-width: 2px; }
  .leader.player { border-color: #00e5ff; }
  .leader.enemy { border-color: #ff1744; }
  .leader::before { content: "ROOT"; position: absolute; top: -6px; left: -2px; background: #000; border: 1px solid currentColor; font-size: 8px; padding: 0 2px; z-index: 12;}
  .leader.player::before { color: #00e5ff; }
  .leader.enemy::before { color: #ff1744; }

  /* 属性バッジ（タグ） */
  .attr-badge { position: absolute; top: -6px; right: -4px; font-size: 8px; color: #000; padding: 0 3px; border-radius: 2px; font-weight: bold;}
  .attr-木 { background-color: #00e676; } .attr-火 { background-color: #ff3d00; } .attr-土 { background-color: #ff9100; } .attr-金 { background-color: #ffea00; } .attr-水 { background-color: #2979ff; } .attr-無 { background-color: #9e9e9e; }

  .selected { outline: 2px solid #fff; outline-offset: 2px; transform: scale(1.1); z-index: 15;}
  .buffed { box-shadow: inset 0 0 10px #ffea00, 0 0 10px #ffea00; border-color: #ffea00; }
  .possessing { animation: glitch 0.5s infinite alternate; filter: hue-rotate(90deg); opacity: 0.8;}
  @keyframes glitch { 0% { transform: skewX(0deg); } 20% { transform: skewX(-5deg); } 40% { transform: skewX(5deg); } 100% { transform: skewX(0deg); } }

  /* UIパネル */
  #ui-panel { margin-top: 15px; text-align: center; width: 380px; }
  .resource-bar { display: flex; justify-content: space-between; font-weight: bold; padding: 8px 15px; background: rgba(0,0,0,0.5); border: 1px solid #00bcd4; border-radius: 4px; margin-bottom: 10px; font-size: 12px; }
  .mp-player { color: #00e5ff; text-shadow: 0 0 5px #00e5ff;} 
  .mp-enemy { color: #ff1744; text-shadow: 0 0 5px #ff1744;}

  #unit-info { font-size: 11px; color: #b2ebf2; margin-bottom: 10px; background: rgba(0, 188, 212, 0.1); padding: 6px; border: 1px solid #00bcd4; }

  .btn-group { display: flex; gap: 6px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
  button.mode-btn { padding: 6px 12px; cursor: pointer; border: 1px solid #00bcd4; border-radius: 2px; font-weight: bold; font-size: 11px; transition: all 0.2s; font-family: inherit; color: #00e5ff; background: transparent; text-transform: uppercase;}
  button.mode-btn:active { transform: scale(0.95); }
  .mode-btn:hover { background: rgba(0, 229, 255, 0.2); }
  .mode-btn.active { background: #00e5ff; color: #000; box-shadow: 0 0 10px #00e5ff; }
  
  #btn-summon { border-color: #d500f9; color: #ea80fc; }
  #btn-summon:hover, #btn-summon.active { background: #d500f9; color: #fff; box-shadow: 0 0 10px #d500f9;}
  
  #btn-possess { border-color: #ff9100; color: #ffd180; }
  #btn-possess:hover, #btn-possess.active { background: #ff9100; color: #000; box-shadow: 0 0 10px #ff9100;}
  
  #btn-cancel { border-color: #555; color: #aaa; }
  #btn-cancel:hover { background: #555; color: #fff; }
  
  #execute-btn { background: rgba(0, 230, 118, 0.2); color: #00e676; width: 100%; font-size: 14px; margin-top: 5px; padding: 12px; border: 1px solid #00e676; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;}
  #execute-btn:hover { background: #00e676; color: #000; box-shadow: 0 0 15px #00e676;}
  
  #summon-panel { background: rgba(213, 0, 249, 0.1); border: 1px dashed #d500f9; padding: 8px; margin-bottom: 10px; display: none; flex-wrap: wrap; justify-content: center; gap: 4px;}
  .summon-btn { background: transparent; color: #ea80fc; font-size: 10px; padding: 4px 8px; border: 1px solid #d500f9; cursor: pointer;}
  .summon-btn:hover { background: rgba(213, 0, 249, 0.3); }

  /* ターミナルログ */
  #log { background: #000; color: #00e676; padding: 10px; width: 360px; height: 100px; overflow-y: auto; font-size: 10px; margin-top: 10px; border: 1px solid #333; text-align: left; line-height: 1.4; border-left: 3px solid #00e676; }
  .log-atk { color: #ff1744; } .log-heal { color: #00e5ff; } .log-sys { color: #ffea00; } .log-possess { color: #d500f9; }

  #result-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 1px solid #00e5ff;}
  #result-title { font-size: 40px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 20px currentColor; letter-spacing: 5px;}
  #result-desc { font-size: 14px; color: #b2ebf2; margin-bottom: 40px; }
</style>
</head>
<body>
<div id="app-container">

  <div id="screen-title" class="screen active">
    <h1>月面サーバー防衛戦</h1>
    <div class="subtitle">
      対象：音楽配信サーバー『OTOBA』<br>
      脅威：月面由来ウイルス（バグ）<br>
      任務：和風防衛プログラムによる完全排除
    </div>
    <div style="display: flex; gap: 15px; flex-direction: column; width: 70%;">
      <button class="big-btn" onclick="showScreen('screen-deck')">SYSTEM_BOOT</button>
    </div>
  </div>

  <div id="screen-deck" class="screen">
    <h2>防衛プログラム・インストール</h2>
    <div id="deck-list"></div>
    <div id="deck-warning"></div>
    <div id="deck-status" style="font-weight:bold; margin-bottom:15px; color:#00e5ff;">SETUP: 0 / 3</div>
    <div style="display:flex; gap:15px;">
      <button class="big-btn" style="border-color:#555; color:#aaa;" onclick="showScreen('screen-title')">BACK</button>
      <button id="btn-start-battle" class="big-btn" onclick="startBattle()" disabled>DEPLOY_START</button>
    </div>
  </div>

  <div id="screen-battle" class="screen">
    <h2>VIRTUAL BOARD : OTOBA</h2>
    <div id="board"></div>

    <div id="ui-panel">
      <div class="resource-bar">
        <span class="mp-player">Admin Memory: <span id="val-mp-player">5</span></span>
        <span class="mp-enemy">Virus Memory: <span id="val-mp-enemy">5</span></span>
      </div>

      <div id="unit-info">> 待機中... コマンド対象を選択してください。</div>
      
      <div id="summon-panel"></div>

      <div class="btn-group">
        <button id="btn-move" class="mode-btn">Move (移動)</button>
        <button id="btn-attack" class="mode-btn">Exec (実行)</button>
        <button id="btn-possess" class="mode-btn">Override (上書)</button>
        <button id="btn-summon" class="mode-btn">Deploy (展開)</button>
        <button id="btn-cancel" class="mode-btn">Cancel</button>
      </div>
      <button id="execute-btn">TURN RESOLVE (一斉処理)</button>
    </div>

    <div id="log"></div>

    <div id="result-overlay">
      <div id="result-title"></div>
      <div id="result-desc"></div>
      <button class="big-btn" onclick="showScreen('screen-title')">SYSTEM_REBOOT</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// マスターデータ (和風サイバー変換)
// ==========================================
const GAME_CONFIG = {
  MP_REWARD: { move: 1, risk_zone: 1, turn_end: 0 },
  DAMAGE: { weak_multiplier: 1.5, resist_multiplier: 0.5, collision: 2 },
  BUFF: { atk_boost: 3 }
};
const ELEMENT_WEAK = { '木': '土', '土': '水', '水': '火', '火': '金', '金': '木' };
const ELEMENT_BOOST = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
const BOARD_SIZE = 7;

// 名前をサイバー風（.exe / .sys）に変更
const SHIKIGAMI_MASTER = [
  { id: 'z_onibi', name: "ONIBI.exe", element: "火", hp: 4, atk: 2, reach: 1, cost: 1, isTensho: false, desc: "低コスト" },
  { id: 'z_dorotabo', name: "DOROTABO.exe", element: "土", hp: 8, atk: 1, reach: 1, cost: 1, isTensho: false, desc: "低コスト・耐久" },
  { id: 'z_kodama', name: "KODAMA.exe", element: "木", hp: 5, atk: 1, reach: 1, cost: 1, isTensho: false, desc: "低コスト" },
  { id: 'z_kappa', name: "KAPPA.exe", element: "水", hp: 6, atk: 2, reach: 1, cost: 2, isTensho: false, desc: "標準" },
  { id: 'z_kamaitachi', name: "KAMAITACHI.exe", element: "金", hp: 4, atk: 3, reach: 2, cost: 2, isTensho: false, desc: "射程2" },
  { id: 'z_nurikabe', name: "NURIKABE.exe", element: "土", hp: 12, atk: 1, reach: 1, cost: 2, isTensho: false, desc: "高耐久の壁" },
  { id: 'z_yukionna', name: "YUKIONNA.exe", element: "水", hp: 5, atk: 2, reach: 2, cost: 2, isTensho: false, desc: "遠隔実行" },
  { id: 'z_wanyudo', name: "WANYUDO.exe", element: "火", hp: 4, atk: 4, reach: 1, cost: 2, isTensho: false, desc: "攻撃特化" },
  { id: 'z_tengu', name: "TENGU.exe", element: "木", hp: 6, atk: 3, reach: 2, cost: 3, isTensho: false, desc: "高機動" },
  { id: 'z_kyoki', name: "KYOKOTSU.exe", element: "金", hp: 4, atk: 5, reach: 1, cost: 2, isTensho: false, desc: "特攻火力" },

  { id: 's_seiryu', name: "SEIRYU.sys", element: "木", hp: 12, atk: 5, reach: 2, cost: 3, isTensho: true, tenshoAbility: 'reach', desc: "上書:射程+1" },
  { id: 's_genbu', name: "GENBU.sys", element: "水", hp: 15, atk: 2, reach: 1, cost: 3, isTensho: true, tenshoAbility: 'hp', desc: "上書:HP+10" },
  { id: 's_touda', name: "TOUDA.sys", element: "火", hp: 8, atk: 6, reach: 3, cost: 4, isTensho: true, tenshoAbility: 'atk_max', desc: "上書:攻+5" },
  { id: 's_byakko', name: "BYAKKO.sys", element: "金", hp: 10, atk: 7, reach: 1, cost: 4, isTensho: true, tenshoAbility: 'bruiser', desc: "上書:攻+3/HP+6" },
  { id: 's_sujaku', name: "SUJAKU.sys", element: "火", hp: 10, atk: 5, reach: 2, cost: 4, isTensho: true, tenshoAbility: 'balance', desc: "上書:攻+2/HP+5" },
  { id: 's_kijin', name: "KIJIN.sys", element: "土", hp: 12, atk: 6, reach: 2, cost: 4, isTensho: true, tenshoAbility: 'kijin', desc: "上書:攻+3/HP+5" }
];

// 初期配置もシステム管理ライクに
const INITIAL_UNITS = [
  { id: "p_leader", name: "ADMIN", owner: "player", element: "無", hp: 20, atk: 2, buffAtk: 0, x: 3, y: 6, reach: 1, isLeader: true },
  { id: "e_leader", name: "VIRUS_CORE", owner: "enemy", element: "無", hp: 25, atk: 3, buffAtk: 0, x: 3, y: 0, reach: 1, isLeader: true },
  { id: "u1", name: "ZENKI.exe", owner: "player", element: "木", hp: 10, atk: 4, buffAtk: 0, x: 2, y: 5, reach: 1, isTensho: false },
  { id: "u2", name: "GOKI.bug", owner: "enemy", element: "水", hp: 10, atk: 4, buffAtk: 0, x: 4, y: 1, reach: 2, isTensho: false }
];

// ==========================================
// 状態管理
// ==========================================
let playerDeckIds = [];
let gameData = { units: [] };
let mp = { player: 0, enemy: 0 };
let uiState = 'IDLE'; 
let activeUnitId = null;
let planned = {}; let plannedSummons = []; let selectedSummonTemplate = null; let unitCounter = 3;

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  if (screenId === 'screen-deck') initDeckScreen();
}

function initDeckScreen() {
  playerDeckIds = [];
  document.getElementById('deck-warning').innerText = "";
  const listEl = document.getElementById('deck-list');
  listEl.innerHTML = '';
  
  SHIKIGAMI_MASTER.forEach(s => {
    const card = document.createElement('div');
    card.className = 'deck-card';
    card.dataset.id = s.id;
    const typeClass = s.isTensho ? "dc-type tensho" : "dc-type";
    card.innerHTML = `
      <div class="attr-badge attr-${s.element}" style="position:static; margin: 0 auto 4px;">${s.element}</div>
      <div class="dc-name">${s.name}</div>
      <div class="${typeClass}">${s.isTensho ? '[特権プログラム]' : '[一般プログラム]'}</div>
      <div class="dc-stats">ATK:${s.atk} HP:${s.hp} R:${s.reach}</div>
      <div class="dc-cost">MEM:${s.cost}</div>
      <div style="font-size:9px; color:#888; margin-top:4px;">${s.desc}</div>
    `;
    card.onclick = () => toggleDeckSelection(card, s.id);
    listEl.appendChild(card);
  });
  updateDeckStatus();
}

function toggleDeckSelection(cardEl, id) {
  const warningEl = document.getElementById('deck-warning');
  warningEl.innerText = "";
  const index = playerDeckIds.indexOf(id);
  const targetShikigami = SHIKIGAMI_MASTER.find(s => s.id === id);

  if (index > -1) {
    playerDeckIds.splice(index, 1);
    cardEl.classList.remove('selected');
  } else {
    if (playerDeckIds.length >= 3) {
      warningEl.innerText = "[ERROR] 最大3スロットまでです。";
      return;
    }
    if (targetShikigami.isTensho) {
      const currentTenshoCount = playerDeckIds.filter(deckId => {
        return SHIKIGAMI_MASTER.find(m => m.id === deckId).isTensho;
      }).length;
      if (currentTenshoCount >= 1) {
        warningEl.innerText = "[ERROR] 特権プログラム(.sys)は1つのみです。";
        return;
      }
    }
    playerDeckIds.push(id);
    cardEl.classList.add('selected');
  }
  updateDeckStatus();
}

function updateDeckStatus() {
  const count = playerDeckIds.length;
  document.getElementById('deck-status').innerText = `SETUP: ${count} / 3`;
  document.getElementById('btn-start-battle').disabled = (count !== 3);
  
  const hasTensho = playerDeckIds.some(id => SHIKIGAMI_MASTER.find(m => m.id === id).isTensho);
  document.querySelectorAll('.deck-card').forEach(card => {
    const s = SHIKIGAMI_MASTER.find(m => m.id === card.dataset.id);
    if (s.isTensho && hasTensho && !card.classList.contains('selected')) {
      card.classList.add('disabled');
    } else {
      card.classList.remove('disabled');
    }
  });
}

function getEffectiveStats(unit) {
  let effAtk = unit.atk + unit.buffAtk;
  let effReach = unit.reach;
  
  if (unit.isLeader) {
    gameData.units.forEach(ally => {
      if (ally.owner === unit.owner && planned[ally.id]?.possess) {
        effAtk += Math.max(1, Math.ceil(ally.atk * 0.5));
        if (ally.isTensho) {
          if (ally.tenshoAbility === 'atk_max') effAtk += 5;
          if (ally.tenshoAbility === 'reach') effReach += 1;
          if (ally.tenshoAbility === 'balance') effAtk += 2;
          if (ally.tenshoAbility === 'bruiser') effAtk += 3;
          if (ally.tenshoAbility === 'kijin') effAtk += 3;
        }
      }
    });
  }
  return { effAtk, effReach };
}

function getUnitLogName(unit) {
  return (unit.owner === 'player' ? "[SYS]" : "[VIRUS]") + unit.name;
}

// ==========================================
// バトル画面・クリック処理
// ==========================================
const logEl = document.getElementById('log');
function addLog(msg, type="") { 
  let cssClass = "";
  if(type === "atk") cssClass = "log-atk";
  if(type === "heal") cssClass = "log-heal";
  if(type === "sys") cssClass = "log-sys";
  if(type === "possess") cssClass = "log-possess";
  logEl.innerHTML += `<span class="${cssClass}">> ${msg}</span><br>`; 
  logEl.scrollTop = logEl.scrollHeight; 
}

function startBattle() {
  const panel = document.getElementById('summon-panel');
  panel.innerHTML = '';
  playerDeckIds.forEach(id => {
    const s = SHIKIGAMI_MASTER.find(m => m.id === id);
    const btn = document.createElement('button');
    btn.className = 'summon-btn';
    btn.innerText = `${s.name} (Mem${s.cost})`;
    btn.onclick = () => startSummon(s.id);
    panel.appendChild(btn);
  });

  document.getElementById('btn-move').onclick = () => setMode('SELECTING_MOVE');
  document.getElementById('btn-attack').onclick = () => setMode('SELECTING_ATTACK');
  document.getElementById('btn-possess').onclick = () => {
    if (!activeUnitId) return;
    const u = gameData.units.find(un => un.id === activeUnitId);
    if (u.isLeader) { addLog(`[ERROR] ROOTはオーバーライドできません。`, "sys"); return; }
    if (u.owner !== 'player') { addLog(`[ERROR] 対象の権限がありません。`, "sys"); return; }
    planned[activeUnitId] = { move: null, attack: null, possess: true };
    uiState = 'IDLE'; addLog(`[SYNC] ${u.name} のオーバーライドを予約。`, "possess"); render();
  };
  document.getElementById('btn-summon').onclick = () => {
    uiState = 'IDLE'; document.getElementById('summon-panel').style.display = 'flex'; render();
  };
  document.getElementById('btn-cancel').onclick = cancelActions;
  document.getElementById('execute-btn').onclick = executeTurn;

  const board = document.getElementById('board');
  board.innerHTML = ''; 
  for (let y = 0; y < BOARD_SIZE; y++) {
    for (let x = 0; x < BOARD_SIZE; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.onclick = () => handleCellClick(x, y);
      board.appendChild(cell);
    }
  }

  gameData.units = JSON.parse(JSON.stringify(INITIAL_UNITS));
  mp = { player: 5, enemy: 5 };
  planned = {}; plannedSummons = []; uiState = 'IDLE'; activeUnitId = null; unitCounter = INITIAL_UNITS.length;
  document.getElementById('result-overlay').style.display = 'none';
  logEl.innerHTML = "";
  addLog("OTOBA SERVER CONNECTED. 防衛シーケンス開始。", "sys");
  showScreen('screen-battle');
  render();
}

function setMode(mode) {
  if (!activeUnitId) return;
  uiState = mode; document.getElementById('summon-panel').style.display = 'none'; render();
}

function cancelActions() {
  if (activeUnitId && planned[activeUnitId]) planned[activeUnitId] = { move: null, attack: null, possess: false };
  plannedSummons = []; uiState = 'IDLE'; document.getElementById('summon-panel').style.display = 'none'; render();
}

function startSummon(templateId) {
  const template = SHIKIGAMI_MASTER.find(m => m.id === templateId);
  const currentReservedMP = plannedSummons.reduce((sum, s) => sum + s.cost, 0);
  if (mp.player - currentReservedMP < template.cost) {
    addLog(`[ERROR] メモリが不足しています。(Require: ${template.cost})`, "sys"); return;
  }
  selectedSummonTemplate = templateId; uiState = 'SELECTING_SUMMON_TARGET';
  document.getElementById('unit-info').innerText = `> ${template.name} の展開座標を指定してください。`;
}

function handleCellClick(x, y) {
  const unit = gameData.units.find(u => u.x === x && u.y === y);

  switch (uiState) {
    case 'IDLE':
      if (unit) {
        if (unit.owner === 'enemy') {
           const stats = getEffectiveStats(unit);
           addLog(`Scan: ${unit.name} (HP:${unit.hp} / ATK:${stats.effAtk} / R:${stats.effReach} / Attr:${unit.element})`, "sys");
        } else {
           activeUnitId = unit.id; 
           document.getElementById('summon-panel').style.display = 'none';
           if (!planned[activeUnitId]) planned[activeUnitId] = { move: null, attack: null, possess: false };
        }
      }
      break;

    case 'SELECTING_MOVE':
      const uMove = gameData.units.find(u => u.id === activeUnitId);
      if (!uMove) { uiState = 'IDLE'; return; }
      
      if (Math.abs(uMove.x - x) <= 1 && Math.abs(uMove.y - y) <= 1) {
        planned[activeUnitId].move = { x, y }; 
        planned[activeUnitId].possess = false; 
        uiState = 'IDLE';
        
        if (planned[activeUnitId].attack) {
          const ax = planned[activeUnitId].attack.x; const ay = planned[activeUnitId].attack.y;
          const stats = getEffectiveStats(uMove);
          if (Math.abs(x - ax) > stats.effReach || Math.abs(y - ay) > stats.effReach) planned[activeUnitId].attack = null;
        }
        if (uMove.isLeader && uMove.owner === 'player') {
          plannedSummons = plannedSummons.filter(s => Math.abs(x - s.x) <= 1 && Math.abs(y - s.y) <= 1);
        }
      } else { 
        addLog(`[ERROR] 指定座標が移動範囲外です。`, "sys"); 
      }
      break;

    case 'SELECTING_ATTACK':
      const uAtk = gameData.units.find(u => u.id === activeUnitId);
      if (!uAtk) { uiState = 'IDLE'; return; }
      
      const origin = planned[activeUnitId].move || { x: uAtk.x, y: uAtk.y };
      const stats = getEffectiveStats(uAtk);
      if (Math.abs(origin.x - x) <= stats.effReach && Math.abs(origin.y - y) <= stats.effReach) {
        planned[activeUnitId].attack = { x, y }; 
        planned[activeUnitId].possess = false; 
        uiState = 'IDLE';
      } else { 
        addLog(`[ERROR] 指定座標が実行範囲外です。`, "sys"); 
      }
      break;

    case 'SELECTING_SUMMON_TARGET':
      const leader = gameData.units.find(u => u.isLeader && u.owner === 'player');
      const leaderOrigin = planned[leader.id]?.move || { x: leader.x, y: leader.y };
      
      if (Math.abs(leaderOrigin.x - x) <= 1 && Math.abs(leaderOrigin.y - y) <= 1) {
        const isProjectedOccupied = gameData.units.some(u => {
          const px = planned[u.id]?.move ? planned[u.id].move.x : u.x;
          const py = planned[u.id]?.move ? planned[u.id].move.y : u.y;
          return px === x && py === y && !planned[u.id]?.possess;
        });
        const alreadySummoned = plannedSummons.find(s => s.x === x && s.y === y);
        
        if (isProjectedOccupied || alreadySummoned) {
          addLog(`[ERROR] 対象セクタは占有予定です。`, "sys");
          return;
        }

        const template = SHIKIGAMI_MASTER.find(m => m.id === selectedSummonTemplate);
        plannedSummons.push({ templateId: selectedSummonTemplate, x: x, y: y, cost: template.cost });
        addLog(`[TASK] ${template.name} の展開シーケンス予約。`);
        uiState = 'IDLE'; 
        document.getElementById('summon-panel').style.display = 'none';
      } else { 
        addLog(`[ERROR] ADMIN周囲セクタ以外には展開できません。`, "sys"); 
      }
      break;
  }
  render();
}

function executeTurn() { planEnemyActionsAI(); setTimeout(resolveTurn, 400); }

function planEnemyActionsAI() {
  const enemies = gameData.units.filter(u => u.owner === 'enemy');
  const players = gameData.units.filter(u => u.owner === 'player');
  enemies.forEach(enemy => {
    if (!planned[enemy.id]) planned[enemy.id] = { move: null, attack: null };
    let closestPlayer = null; let minDistance = Infinity;
    players.forEach(p => {
      const dist = Math.max(Math.abs(p.x - enemy.x), Math.abs(p.y - enemy.y));
      if (dist < minDistance) { minDistance = dist; closestPlayer = p; }
    });
    if (!closestPlayer) return;
    if (minDistance <= enemy.reach) {
      planned[enemy.id].attack = { x: closestPlayer.x, y: closestPlayer.y };
    } else {
      const dx = Math.sign(closestPlayer.x - enemy.x);
      const dy = Math.sign(closestPlayer.y - enemy.y);
      const targetX = enemy.x + dx; const targetY = enemy.y + dy;
      const isOccupied = gameData.units.find(u => u.x === targetX && u.y === targetY);
      if (!isOccupied) planned[enemy.id].move = { x: targetX, y: targetY };
    }
  });
}

function calculateManaGain(unit, prevX, prevY) {
  let gainedMP = 0;
  if (unit.x !== prevX || unit.y !== prevY) gainedMP += GAME_CONFIG.MP_REWARD.move;
  const isNearEnemy = gameData.units.some(other => 
    other.owner !== unit.owner && Math.abs(other.x - unit.x) <= 1 && Math.abs(other.y - unit.y) <= 1
  );
  if (isNearEnemy) gainedMP += GAME_CONFIG.MP_REWARD.risk_zone;
  return gainedMP;
}

function resolveTurn() {
  addLog("--- BATCH PROCESS START ---", "sys");
  gameData.units.forEach(u => { u.buffAtk = 0; });

  // ① 衝突判定
  let collidedUnitIds = new Set();
  let resolving = true;
  let loopCount = 0;

  while (resolving && loopCount < 10) {
    resolving = false;
    let projected = {};
    
    gameData.units.forEach(u => {
      const px = planned[u.id]?.move ? planned[u.id].move.x : u.x;
      const py = planned[u.id]?.move ? planned[u.id].move.y : u.y;
      const key = `${px},${py}`;
      if (!projected[key]) projected[key] = [];
      projected[key].push(u.id);
    });

    for (const [key, unitIds] of Object.entries(projected)) {
      if (unitIds.length > 1) {
        unitIds.forEach(id => {
          if (planned[id]?.move) {
            planned[id].move = null; 
            resolving = true; 
          }
          collidedUnitIds.add(id);
        });
      }
    }

    gameData.units.forEach(u1 => {
      if (planned[u1.id]?.move) {
        const destX = planned[u1.id].move.x;
        const destY = planned[u1.id].move.y;
        const u2 = gameData.units.find(u => u.x === destX && u.y === destY);
        if (u2 && planned[u2.id]?.move && planned[u2.id].move.x === u1.x && planned[u2.id].move.y === u1.y) {
          planned[u1.id].move = null;
          planned[u2.id].move = null;
          collidedUnitIds.add(u1.id);
          collidedUnitIds.add(u2.id);
          resolving = true;
        }
      }
    });
    loopCount++;
  }

  if (collidedUnitIds.size > 0) {
    addLog(`[WARNING] プログラム同士の衝突を検知。`, "atk");
    collidedUnitIds.forEach(id => {
      const unit = gameData.units.find(u => u.id === id);
      if (unit) {
        unit.hp -= GAME_CONFIG.DAMAGE.collision;
        addLog(` ${getUnitLogName(unit)} に${GAME_CONFIG.DAMAGE.collision}の破損!`, "atk");
      }
    });
  }

  let turnMpGain = { player: GAME_CONFIG.MP_REWARD.turn_end, enemy: GAME_CONFIG.MP_REWARD.turn_end };
  gameData.units.forEach(u => {
    const prevX = u.x; const prevY = u.y;
    if (planned[u.id]?.move) { u.x = planned[u.id].move.x; u.y = planned[u.id].move.y; }
    const gain = calculateManaGain(u, prevX, prevY);
    if (gain > 0) turnMpGain[u.owner] += gain;
  });
  mp.player += turnMpGain.player; mp.enemy += turnMpGain.enemy;

  // ② 憑依（オーバーライド）
  gameData.units.forEach(u => {
    if (planned[u.id]?.possess && u.hp > 0) {
      const leader = gameData.units.find(l => l.isLeader && l.owner === u.owner);
      if (leader && leader.hp > 0) {
        const hpBonus = Math.max(1, Math.ceil(u.hp * 0.5));
        const atkBonus = Math.max(1, Math.ceil(u.atk * 0.5));
        leader.hp += hpBonus; leader.atk += atkBonus;
        leader.element = u.element; 

        let tenshoMsg = "";
        if (u.isTensho) {
          if (u.tenshoAbility === 'reach') { leader.reach += 1; tenshoMsg = " [SYSPATH: R+1]"; } 
          else if (u.tenshoAbility === 'atk_max') { leader.atk += 5; tenshoMsg = " [SYSPATH: ATK+5]"; }
          else if (u.tenshoAbility === 'hp') { leader.hp += 10; tenshoMsg = " [SYSPATH: HP+10]"; }
          else if (u.tenshoAbility === 'balance') { leader.atk += 2; leader.hp += 5; tenshoMsg = " [SYSPATH: ATK+2/HP+5]"; }
          else if (u.tenshoAbility === 'bruiser') { leader.atk += 3; leader.hp += 6; tenshoMsg = " [SYSPATH: ATK+3/HP+6]"; }
          else if (u.tenshoAbility === 'kijin') { leader.atk += 3; leader.hp += 5; tenshoMsg = " [SYSPATH: ATK+3/HP+5]"; }
        }

        addLog(`[SYNC] ${getUnitLogName(u)} がADMIN権限に上書き。 (HP+${hpBonus} / ATK+${atkBonus} / Attr:${u.element})${tenshoMsg}`, "possess");
        u.hp = 0; 
      }
    }
  });

  // ③ 攻撃解決
  gameData.units.forEach(u => {
    const atkPlot = planned[u.id]?.attack;
    if (!atkPlot) return;
    const target = gameData.units.find(t => t.x === atkPlot.x && t.y === atkPlot.y);
    
    if (target && target.id !== u.id && u.hp > 0 && !planned[u.id]?.possess) { 
      if (target.owner !== u.owner) {
        let dmg = u.atk + u.buffAtk; let msg = "";
        if (ELEMENT_WEAK[u.element] === target.element) {
          dmg = Math.floor(dmg * GAME_CONFIG.DAMAGE.weak_multiplier); msg = "(CRITICAL!)";
        } else if (ELEMENT_BOOST[u.element] === target.element) {
          dmg = Math.floor(dmg * GAME_CONFIG.DAMAGE.resist_multiplier); msg = "(RESIST...)";
        }
        target.hp -= dmg;
        addLog(`[EXEC] ${getUnitLogName(u)} -> ${getUnitLogName(target)} に ${dmg}ダメージ ${msg}`, "atk");
      } else {
        if (ELEMENT_BOOST[u.element] === target.element) {
          target.buffAtk += GAME_CONFIG.BUFF.atk_boost;
          addLog(`[BUFF] ${getUnitLogName(u)} -> ${getUnitLogName(target)} に相生バフ付与。(Next ATK+${GAME_CONFIG.BUFF.atk_boost})`, "heal");
        }
      }
    } else if (u.hp > 0 && !planned[u.id]?.possess) { 
      addLog(`[MISS] ${getUnitLogName(u)} のプロセスが空振りました。`); 
    }
  });

  // ④ 召喚解決
  plannedSummons.forEach(summon => {
    const isOccupied = gameData.units.find(u => u.x === summon.x && u.y === summon.y);
    const template = SHIKIGAMI_MASTER.find(m => m.id === summon.templateId);
    if (isOccupied) {
      addLog(`[ERROR] 展開対象セクタに別プロセスが存在します。`, "sys");
    } else {
      mp.player -= summon.cost; unitCounter++;
      gameData.units.push({
        id: `u_${unitCounter}`, name: template.name, owner: 'player', element: template.element,
        hp: template.hp, atk: template.atk, buffAtk: 0, reach: template.reach, 
        isTensho: template.isTensho, tenshoAbility: template.tenshoAbility,
        x: summon.x, y: summon.y
      });
      addLog(`[DEPLOY] 味方の${template.name} が起動しました。`, "heal");
    }
  });
  plannedSummons = [];

  let playerLeaderDead = false; let enemyLeaderDead = false;
  gameData.units = gameData.units.filter(u => {
    if (u.hp <= 0) {
      if (!planned[u.id]?.possess) addLog(`[KILL] ${getUnitLogName(u)} が完全停止。`, "atk");
      if (u.isLeader) {
        if (u.owner === 'player') playerLeaderDead = true;
        if (u.owner === 'enemy') enemyLeaderDead = true;
      }
      return false;
    }
    return true;
  });

  planned = {}; activeUnitId = null; uiState = 'IDLE'; render();

  if (playerLeaderDead || enemyLeaderDead) {
    let title = ""; let desc = ""; let color = "";
    if (playerLeaderDead && enemyLeaderDead) {
      title = "DRAW"; desc = "相互のコアが同時に停止しました。"; color = "#aaa";
    } else if (playerLeaderDead) {
      title = "SYSTEM DOWN"; desc = "ADMIN権限が奪取されました..."; color = "#ff1744";
    } else {
      title = "VIRUS CLEARED"; desc = "OTOBAサーバーの防衛に成功しました！"; color = "#00e676";
    }
    document.getElementById('result-title').innerText = title;
    document.getElementById('result-title').style.color = color;
    document.getElementById('result-desc').innerText = desc;
    document.getElementById('result-overlay').style.display = 'flex';
  }
}

function render() {
  const cells = document.querySelectorAll('.cell');
  cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

  const currentReservedMP = plannedSummons.reduce((sum, s) => sum + s.cost, 0);
  document.getElementById('val-mp-player').innerText = mp.player - currentReservedMP;
  document.getElementById('val-mp-enemy').innerText = mp.enemy;

  if (uiState !== 'SELECTING_SUMMON_TARGET') {
    const activeUnit = gameData.units.find(u => u.id === activeUnitId);
    if (activeUnit) {
      const stats = getEffectiveStats(activeUnit);
      const atkText = stats.effAtk > activeUnit.atk ? `${stats.effAtk}(予測)` : stats.effAtk;
      const reachText = stats.effReach > activeUnit.reach ? `${stats.effReach}(予測)` : stats.effReach;
      
      document.getElementById('unit-info').innerText = `> TARGET: ${activeUnit.name} | ATK:${atkText} R:${reachText} Attr:${activeUnit.element}`;
      
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      if (uiState === 'SELECTING_MOVE') document.getElementById('btn-move').classList.add('active');
      if (uiState === 'SELECTING_ATTACK') document.getElementById('btn-attack').classList.add('active');
    } else {
      document.getElementById('unit-info').innerText = `> 待機中... コマンド対象を選択してください。`;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    }
  }

  plannedSummons.forEach(s => {
    const idx = s.y * BOARD_SIZE + s.x;
    cells[idx].classList.add('summon-target');
  });

  gameData.units.forEach(u => {
    const idx = u.y * BOARD_SIZE + u.x;
    const div = document.createElement('div');
    let classes = `shikigami ${u.owner}`;
    if (u.id === activeUnitId) classes += ' selected';
    if (u.isLeader) classes += ' leader';
    if (u.buffAtk > 0) classes += ' buffed'; 
    if (planned[u.id]?.possess) classes += ' possessing';
    div.className = classes;
    
    const attrBadge = `<div class="attr-badge attr-${u.element}">${u.element}</div>`;
    const dispAtk = u.isLeader ? getEffectiveStats(u).effAtk : u.atk + u.buffAtk;
    
    div.innerHTML = `
      ${attrBadge}
      <div class="u-name">${u.name}</div>
      <div class="u-stats">A:${dispAtk} H:${u.hp}</div>
    `;
    cells[idx].appendChild(div);

    if (planned[u.id]?.move) cells[planned[u.id].move.y * BOARD_SIZE + planned[u.id].move.x].classList.add('move-target');
    if (planned[u.id]?.attack) cells[planned[u.id].attack.y * BOARD_SIZE + planned[u.id].attack.x].classList.add('attack-target');
  });
}

showScreen('screen-title');
</script>
