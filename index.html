<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>超かぐや姫伝 - 月面防衛線 -</title>
<style>
  /* ==========================================
     超かぐや姫！ドット絵テーマ・ベーススタイル
  ========================================== */
  @font-face {
    font-family: 'PixelMplus';
    src: url('https://raw.githubusercontent.com/itouhiro/pixelmplus/master/fonts/PixelMplus12-Regular.ttf') format('truetype');
  }

  body { 
    /* ドット絵風のフォント設定 */
    font-family: 'PixelMplus', 'Courier New', 'Hiragino Kaku Gothic ProN', monospace;
    -webkit-font-smoothing: none; /* ドット絵をクッキリさせる */
    image-rendering: pixelated; /* ドット絵をクッキリさせる */
    user-select: none; 
    
    /* 背景：ドット絵で描かれた竹林と月面 */
    background-color: #000000; 
    background-image: 
      /* ドット絵の竹林 */
      url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAAXNSR0IArs4c6QAAADFJREFUGFdjYEACv9f+ZWBgYGARZGBgwCkgAARuBmwC7EwMDGwMqAQUmBkY8AnACwByLQQEtC5gOAAAAABJRU5ErkJggg=='), /* 竹の節 */
      linear-gradient(#0a0a20 50%, #000000 50%);
    background-size: 8px 8px, 100% 100%;
    color: #e0f7fa; 
    margin: 0; padding: 20px; 
    display: flex; justify-content: center; align-items: center; min-height: 100vh; 
  }
  
  #app-container { 
    position: relative; 
    /* ドット絵世界の石板風背景 */
    background: #000; 
    padding: 20px 30px; 
    border-radius: 4px; /* レトロなので角は鋭く */
    /* ドット絵風の太めの枠線 */
    border: 4px solid #fff; 
    outline: 4px solid #00e5ff; /* 光る枠 */
    width: 440px; display: flex; flex-direction: column; 
    align-items: center; min-height: 600px;
    box-shadow: 0 0 0 8px #000; /* さらに外側の黒枠 */
  }
  
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
  .screen.active { display: flex; }
  
  h1 { font-size: 28px; color: #fff; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 4px 4px #00e5ff, -4px -4px #ff1744; text-align: center; font-weight: normal;}
  h2 { color: #fff; margin-top: 0; margin-bottom: 15px; letter-spacing: 2px; border-bottom: 2px solid #00e5ff; padding-bottom: 5px; font-size: 16px; font-weight: normal; text-shadow: 2px 2px #000;}
  
  .subtitle { color: #b2ebf2; font-size: 11px; margin-bottom: 30px; text-align: center; line-height: 1.6; text-shadow: 1px 1px #000;}

  /* ドット絵ボタン */
  .big-btn { 
    background: #000; 
    color: #fff; 
    font-size: 16px; 
    padding: 10px 20px; 
    border-radius: 2px; 
    border: 2px solid #fff; 
    box-shadow: 4px 4px #00e5ff; 
    cursor: pointer; 
    transition: 0.1s; 
    font-family: inherit; 
    font-weight: normal; 
    letter-spacing: 1px; 
    text-transform: uppercase;
    position: relative;
    top: 0; left: 0;
  }
  .big-btn:hover { top: 2px; left: 2px; box-shadow: 2px 2px #00e5ff; }
  .big-btn:active { top: 4px; left: 4px; box-shadow: 0px 0px #00e5ff; }
  .big-btn:disabled { border-color: #555; color: #555; box-shadow: 4px 4px #000; cursor: not-allowed; }

  /* ==========================================
     デッキ編成 (月の仲間募集)
  ========================================== */
  #deck-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; max-height: 380px; overflow-y: auto; padding: 5px;}
  .deck-card { width: 120px; border: 2px solid #fff; border-radius: 2px; padding: 8px; cursor: pointer; text-align: center; background: #000; transition: 0.1s; position: relative; color: #b2ebf2;}
  .deck-card:hover { border-color: #00e5ff; }
  .deck-card.selected { border-color: #ffea00; transform: scale(1.05); box-shadow: 0 0 0 2px #000, 0 0 10px #ffea00; }
  .deck-card.disabled { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
  .dc-name { font-weight: normal; font-size: 12px; margin-bottom: 4px; color: #fff;}
  .dc-type { font-size: 9px; color: #00e5ff; margin-bottom: 4px; }
  .dc-type.tensho { color: #ffea00; font-weight: normal; text-shadow: 1px 1px #000;}
  .dc-stats { font-size: 9px; margin-bottom: 4px; }
  .dc-cost { font-size: 9px; font-weight: normal; color: #fff; background: #9c27b0; border: 1px solid #fff; border-radius: 2px; display: inline-block; padding: 1px 4px;}

  #deck-warning { color: #ff1744; font-size: 11px; font-weight: normal; min-height: 18px; margin-bottom: 10px; text-shadow: 1px 1px #000;}

  /* ==========================================
     バトル画面 (月の盤面)
  ========================================== */
  #board { display: grid; grid-template-columns: repeat(7, 50px); gap: 2px; background-color: #000; padding: 6px; border-radius: 2px; border: 2px solid #fff; }
  .cell { width: 50px; height: 50px; background-color: #0a0a20; border: 1px solid #1a1a40; display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
  .cell:hover { background-color: #1a1a40; border-color: #fff; }

  /* ターゲット予約 (日本語ドット絵) */
  .cell.move-target::after { content: "イドウ"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 229, 255, 0.2); border: 2px solid #00e5ff; box-sizing: border-box; z-index: 20; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 9px; font-weight: normal; color: #fff; text-shadow: 1px 1px #000;}
  .cell.attack-target::after { content: "ジュツ"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 23, 68, 0.2); border: 2px solid #ff1744; box-sizing: border-box; z-index: 20; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 9px; font-weight: normal; color: #fff; text-shadow: 1px 1px #000;}
  .cell.summon-target::after { content: "ショウカン"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(156, 39, 176, 0.2); border: 2px solid #9c27b0; box-sizing: border-box; z-index: 20; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 8px; font-weight: normal; color: #fff; text-shadow: 1px 1px #000;}

  /* ユニット (ドット絵キャラクター画像風) */
  .shikigami { width: 44px; height: 44px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; font-size: 9px; pointer-events: none; z-index: 10; background-color: #000; position: relative; transition: all 0.2s; border-radius: 2px; }
  .u-name { font-size: 8px; letter-spacing: 0px; }
  .u-stats { font-size: 8px; display: flex; gap: 1px; }

  /* プレイヤー=姫軍(青枠), エネミー=闇軍(赤枠) */
  .player { border: 2px solid #00e5ff; color: #fff;}
  .enemy { border: 2px solid #ff1744; color: #fff;}
  
  .leader { border-width: 2px; border-style: double; }
  .leader.player { border-color: #fff; box-shadow: 0 0 10px #00e5ff; }
  .leader.enemy { border-color: #fff; box-shadow: 0 0 10px #ff1744; }
  .leader::before { content: "将"; position: absolute; top: -6px; left: -2px; background: #000; border: 1px solid currentColor; font-size: 7px; padding: 0 1px; z-index: 12;}
  .leader.player::before { color: #00e5ff; }
  .leader.enemy::before { color: #ff1744; }

  /* 属性タグ */
  .attr-badge { position: absolute; top: -6px; right: -4px; font-size: 7px; color: #fff; padding: 0 2px; border-radius: 1px; border: 1px solid #fff;}
  .attr-木 { background-color: #4caf50; } .attr-火 { background-color: #f44336; } .attr-土 { background-color: #8d6e63; } .attr-金 { background-color: #ffb300; } .attr-水 { background-color: #2196f3; } .attr-無 { background-color: #9e9e9e; }

  .selected { outline: 2px solid #fff; outline-offset: 2px; transform: scale(1.1); z-index: 15;}
  .buffed { border-color: #ffea00; box-shadow: 0 0 10px #ffea00; }
  .possessing { animation: glitch 0.3s infinite alternate; }
  @keyframes glitch { 0% { filter: hue-rotate(0deg) saturate(1); } 100% { filter: hue-rotate(180deg) saturate(2); } }

  /* UIパネル */
  #ui-panel { margin-top: 15px; text-align: center; width: 380px; }
  .resource-bar { display: flex; justify-content: space-between; font-weight: normal; padding: 6px 15px; background: #000; border: 2px solid #fff; border-radius: 2px; margin-bottom: 10px; font-size: 11px; }
  .mp-player { color: #00e5ff; } 
  .mp-enemy { color: #ff1744; }

  #unit-info { font-size: 10px; color: #fff; margin-bottom: 10px; background: #000; padding: 6px; border: 2px solid #fff; border-left: 6px solid #fff;}

  .btn-group { display: flex; gap: 6px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
  button.mode-btn { padding: 5px 10px; cursor: pointer; border: 2px solid #fff; border-radius: 2px; font-weight: normal; font-size: 10px; transition: all 0.1s; font-family: inherit; color: #fff; background: #000; }
  button.mode-btn:hover { background: #00e5ff; color: #000; }
  button.mode-btn.active { background: #fff; color: #000; box-shadow: 0 0 10px #fff; }
  
  #btn-summon { border-color: #9c27b0; color: #e1bee7; }
  #btn-summon:hover, #btn-summon.active { background: #9c27b0; color: #fff; }
  
  #btn-possess { border-color: #ffea00; color: #ffea00; }
  #btn-possess:hover, #btn-possess.active { background: #ffea00; color: #000; }
  
  #btn-cancel { border-color: #555; color: #aaa; }
  #btn-cancel:hover { background: #555; color: #fff; }
  
  #execute-btn { background: #000; color: #fff; width: 100%; font-size: 14px; margin-top: 5px; padding: 10px; border: 2px solid #fff; box-shadow: 4px 4px #4caf50; font-family: inherit; font-weight: normal; cursor: pointer; letter-spacing: 2px;}
  #execute-btn:hover { background: #4caf50; color: #000; box-shadow: 2px 2px #fff; }
  
  #summon-panel { background: #000; border: 2px dashed #9c27b0; padding: 6px; margin-bottom: 10px; display: none; flex-wrap: wrap; justify-content: center; gap: 4px;}
  .summon-btn { background: #000; color: #e1bee7; font-size: 9px; padding: 3px 6px; border: 1px solid #9c27b0; cursor: pointer;}
  .summon-btn:hover { background: #9c27b0; color: #fff; }

  /* レトロRPG風テキストログ */
  #log { background: #000; color: #fff; padding: 8px; width: 360px; height: 90px; overflow-y: auto; font-size: 9px; margin-top: 10px; border: 2px solid #fff; text-align: left; line-height: 1.5; border-left: 5px solid #fff; }
  .log-atk { color: #ff8a80; } .log-heal { color: #81d4fa; } .log-sys { color: #ffff8d; } .log-possess { color: #ea80fc; }

  /* 結果オーバーレイ (ドット絵ゲーム風) */
  #result-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 4px solid #fff; outline: 4px solid #00e5ff; }
  #result-title { font-size: 32px; color: #fff; margin-bottom: 10px; text-shadow: 4px 4px #000; letter-spacing: 3px; font-weight: normal;}
  #result-desc { font-size: 12px; color: #b2ebf2; margin-bottom: 40px; }
</style>
</head>
<body>
<div id="app-container">

  <div id="screen-title" class="screen active">
    <h1>超かぐや姫伝</h1>
    <div class="subtitle">
      月の光を闇が切り裂くとき、<br>
      伝説の姫が、今、目覚める...<br>
      月面データベース『竹取の記憶』を守り抜け！
    </div>
    <div style="display: flex; gap: 15px; flex-direction: column; width: 70%;">
      <button class="big-btn" onclick="showScreen('screen-deck')">モノガタリ ヲ ハジメル</button>
    </div>
  </div>

  <div id="screen-deck" class="screen">
    <h2>月の仲間を呼ぶ (3体選択)</h2>
    <div id="deck-list"></div>
    <div id="deck-warning"></div>
    <div id="deck-status" style="font-weight:normal; margin-bottom:15px; color:#00e5ff;">ナカマ: 0 / 3</div>
    <div style="display:flex; gap:15px;">
      <button class="big-btn" style="border-color:#555; color:#aaa;" onclick="showScreen('screen-title')">モドル</button>
      <button id="btn-start-battle" class="big-btn" onclick="startBattle()" disabled>シュツジン！</button>
    </div>
  </div>

  <div id="screen-battle" class="screen">
    <h2>月面データベース『竹取の記憶』</h2>
    <div id="board"></div>

    <div id="ui-panel">
      <div class="resource-bar">
        <span class="mp-player">姫軍Luna: <span id="val-mp-player">5</span></span>
        <span class="mp-enemy">闇軍Luna: <span id="val-mp-enemy">5</span></span>
      </div>

      <div id="unit-info">采配を下す月の仲間を選んでください。</div>
      
      <div id="summon-panel"></div>

      <div class="btn-group">
        <button id="btn-move" class="mode-btn">イドウ (移動)</button>
        <button id="btn-attack" class="mode-btn">ジュツ (光術)</button>
        <button id="btn-possess" class="mode-btn">ガッタイ (憑依)</button>
        <button id="btn-summon" class="mode-btn">ヨビダシ (召喚)</button>
        <button id="btn-cancel" class="mode-btn">トリケシ</button>
      </div>
      <button id="execute-btn">ターン カクテイ (一斉解決)</button>
    </div>

    <div id="log"></div>

    <div id="result-overlay">
      <div id="result-title"></div>
      <div id="result-desc"></div>
      <button class="big-btn" onclick="showScreen('screen-title')">タイトル ヘ モドル</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// マスターデータ (超かぐや姫！ドット絵ゲーム変換)
// ==========================================
const GAME_CONFIG = {
  LUNA_REWARD: { move: 1, risk_zone: 1, turn_end: 0 }, // MP ➡ Luna
  DAMAGE: { weak_multiplier: 1.5, resist_multiplier: 0.5, collision: 2 },
  BUFF: { atk_boost: 3 }
};
const ELEMENT_WEAK = { '木': '土', '土': '水', '水': '火', '火': '金', '金': '木' };
const ELEMENT_BOOST = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
const BOARD_SIZE = 7;

// 名前を月の仲間や闇の異形に変更、ドット絵のRPGっぽく
const SHIKIGAMI_MASTER = [
  { id: 'z_onibi', name: "月の兎・白", element: "火", hp: 4, atk: 2, reach: 1, cost: 1, isTensho: false, desc: "月の新兵" },
  { id: 'z_dorotabo', name: "月の石兵", element: "土", hp: 8, atk: 1, reach: 1, cost: 1, isTensho: false, desc: "頑丈な石の兵" },
  { id: 'z_kodama', name: "月の精・木", element: "木", hp: 5, atk: 1, reach: 1, cost: 1, isTensho: false, desc: "光る竹の精" },
  { id: 'z_kappa', name: "月の雫", element: "水", hp: 6, atk: 2, reach: 1, cost: 2, isTensho: false, desc: "清らかな水の精" },
  { id: 'z_kamaitachi', name: "月の天女", element: "金", hp: 4, atk: 3, reach: 2, cost: 2, isTensho: false, desc: "羽衣で遠攻撃" },
  { id: 'z_nurikabe', name: "月の壁", element: "土", hp: 12, atk: 1, reach: 1, cost: 2, isTensho: false, desc: "通さぬ巨大壁" },
  { id: 'z_yukionna', name: "月の雪女", element: "水", hp: 5, atk: 2, reach: 2, cost: 2, isTensho: false, desc: "冷気で遠攻撃" },
  { id: 'z_wanyudo', name: "月の武者", element: "火", hp: 4, atk: 4, reach: 1, cost: 2, isTensho: false, desc: "剣術特化の兵" },
  { id: 'z_tengu', name: "月の烏", element: "木", hp: 6, atk: 3, reach: 2, cost: 3, isTensho: false, desc: "素早い烏天狗" },
  { id: 'z_kyoki', name: "月の狂戦士", element: "金", hp: 4, atk: 5, reach: 1, cost: 2, isTensho: false, desc: "捨て身の狂気の兵" },

  { id: 's_seiryu', name: "青龍・月", element: "木", hp: 12, atk: 5, reach: 2, cost: 3, isTensho: true, tenshoAbility: 'reach', desc: "憑依:射程+1" },
  { id: 's_genbu', name: "玄武・月", element: "水", hp: 15, atk: 2, reach: 1, cost: 3, isTensho: true, tenshoAbility: 'hp', desc: "憑依:HP+10" },
  { id: 's_touda', name: "騰蛇・月", element: "火", hp: 8, atk: 6, reach: 3, cost: 4, isTensho: true, tenshoAbility: 'atk_max', desc: "憑依:攻+5" },
  { id: 's_byakko', name: "白虎・月", element: "金", hp: 10, atk: 7, reach: 1, cost: 4, isTensho: true, tenshoAbility: 'bruiser', desc: "憑依:攻+3/HP+6" },
  { id: 's_sujaku', name: "朱雀・月", element: "火", hp: 10, atk: 5, reach: 2, cost: 4, isTensho: true, tenshoAbility: 'balance', desc: "憑依:攻+2/HP+5" },
  { id: 's_kijin', name: "貴人・月", element: "土", hp: 12, atk: 6, reach: 2, cost: 4, isTensho: true, tenshoAbility: 'kijin', desc: "憑依:攻+3/HP+5" }
];

// 初期配置もドット絵RPGライクに
const INITIAL_UNITS = [
  { id: "p_leader", name: "月姫", owner: "player", element: "無", hp: 20, atk: 2, buffAtk: 0, x: 3, y: 6, reach: 1, isLeader: true },
  { id: "e_leader", name: "闇の核", owner: "enemy", element: "無", hp: 25, atk: 3, buffAtk: 0, x: 3, y: 0, reach: 1, isLeader: true },
  { id: "u1", name: "月の武者", owner: "player", element: "木", hp: 10, atk: 4, buffAtk: 0, x: 2, y: 5, reach: 1, isTensho: false },
  { id: "u2", name: "闇の異形", owner: "enemy", element: "水", hp: 10, atk: 4, buffAtk: 0, x: 4, y: 1, reach: 2, isTensho: false }
];

// ==========================================
// 状態管理
// ==========================================
let playerDeckIds = [];
let gameData = { units: [] };
let mp = { player: 0, enemy: 0 }; // MP ➡ Luna
let uiState = 'IDLE'; 
let activeUnitId = null;
let planned = {}; let plannedSummons = []; let selectedSummonTemplate = null; let unitCounter = 3;

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  if (screenId === 'screen-deck') initDeckScreen();
}

function initDeckScreen() {
  playerDeckIds = [];
  document.getElementById('deck-warning').innerText = "";
  const listEl = document.getElementById('deck-list');
  listEl.innerHTML = '';
  
  SHIKIGAMI_MASTER.forEach(s => {
    const card = document.createElement('div');
    card.className = 'deck-card';
    card.dataset.id = s.id;
    const typeClass = s.isTensho ? "dc-type tensho" : "dc-type";
    card.innerHTML = `
      <div class="attr-badge attr-${s.element}">${s.element}</div>
      <div class="dc-name">${s.name}</div>
      <div class="${typeClass}">${s.isTensho ? '[月の天将]' : '[月の仲間]'}</div>
      <div class="dc-stats">ATK:${s.atk} HP:${s.hp} R:${s.reach}</div>
      <div class="dc-cost">LNA:${s.cost}</div>
      <div style="font-size:8px; color:#888; margin-top:2px;">${s.desc}</div>
    `;
    card.onclick = () => toggleDeckSelection(card, s.id);
    listEl.appendChild(card);
  });
  updateDeckStatus();
}

function toggleDeckSelection(cardEl, id) {
  const warningEl = document.getElementById('deck-warning');
  warningEl.innerText = "";
  const index = playerDeckIds.indexOf(id);
  const targetShikigami = SHIKIGAMI_MASTER.find(s => s.id === id);

  if (index > -1) {
    playerDeckIds.splice(index, 1);
    cardEl.classList.remove('selected');
  } else {
    if (playerDeckIds.length >= 3) {
      warningEl.innerText = "[ERROR] ナカマは3人までしか選べません。";
      return;
    }
    if (targetShikigami.isTensho) {
      const currentTenshoCount = playerDeckIds.filter(deckId => {
        return SHIKIGAMI_MASTER.find(m => m.id === deckId).isTensho;
      }).length;
      if (currentTenshoCount >= 1) {
        warningEl.innerText = "[ERROR] 天将は1人までしか選べません。";
        return;
      }
    }
    playerDeckIds.push(id);
    cardEl.classList.add('selected');
  }
  updateDeckStatus();
}

function updateDeckStatus() {
  const count = playerDeckIds.length;
  document.getElementById('deck-status').innerText = `ナカマ: ${count} / 3`;
  document.getElementById('btn-start-battle').disabled = (count !== 3);
  
  const hasTensho = playerDeckIds.some(id => SHIKIGAMI_MASTER.find(m => m.id === id).isTensho);
  document.querySelectorAll('.deck-card').forEach(card => {
    const s = SHIKIGAMI_MASTER.find(m => m.id === card.dataset.id);
    if (s.isTensho && hasTensho && !card.classList.contains('selected')) {
      card.classList.add('disabled');
    } else {
      card.classList.remove('disabled');
    }
  });
}

function getEffectiveStats(unit) {
  let effAtk = unit.atk + unit.buffAtk;
  let effReach = unit.reach;
  
  if (unit.isLeader) {
    gameData.units.forEach(ally => {
      if (ally.owner === unit.owner && planned[ally.id]?.possess) {
        effAtk += Math.max(1, Math.ceil(ally.atk * 0.5));
        if (ally.isTensho) {
          if (ally.tenshoAbility === 'atk_max') effAtk += 5;
          if (ally.tenshoAbility === 'reach') effReach += 1;
          if (ally.tenshoAbility === 'balance') effAtk += 2;
          if (ally.tenshoAbility === 'bruiser') effAtk += 3;
          if (ally.tenshoAbility === 'kijin') effAtk += 3;
        }
      }
    });
  }
  return { effAtk, effReach };
}

// ログ用の名前整形関数（ドット絵ゲーム風陣営名）
function getUnitLogName(unit) {
  return (unit.owner === 'player' ? "姫軍の" : "闇軍の") + unit.name;
}

// ==========================================
// バトル画面・クリック処理
// ==========================================
const logEl = document.getElementById('log');
function addLog(msg, type="") { 
  let cssClass = "";
  if(type === "atk") cssClass = "log-atk";
  if(type === "heal") cssClass = "log-heal";
  if(type === "sys") cssClass = "log-sys";
  if(type === "possess") cssClass = "log-possess";
  logEl.innerHTML += `<span class="${cssClass}">> ${msg}</span><br>`; 
  logEl.scrollTop = logEl.scrollHeight; 
}

function startBattle() {
  const panel = document.getElementById('summon-panel');
  panel.innerHTML = '';
  playerDeckIds.forEach(id => {
    const s = SHIKIGAMI_MASTER.find(m => m.id === id);
    const btn = document.createElement('button');
    btn.className = 'summon-btn';
    btn.innerText = `${s.name} (Luna${s.cost})`;
    btn.onclick = () => startSummon(s.id);
    panel.appendChild(btn);
  });

  document.getElementById('btn-move').onclick = () => setMode('SELECTING_MOVE');
  document.getElementById('btn-attack').onclick = () => setMode('SELECTING_ATTACK');
  document.getElementById('btn-possess').onclick = () => {
    if (!activeUnitId) return;
    const u = gameData.units.find(un => un.id === activeUnitId);
    if (u.isLeader) { addLog(`[警告] 将(月姫)自身は憑依できません。`, "sys"); return; }
    if (u.owner !== 'player') { addLog(`[警告] 敵の軍勢は選べません。`, "sys"); return; }
    planned[activeUnitId] = { move: null, attack: null, possess: true };
    uiState = 'IDLE'; addLog(`[SYNC] ${u.name} の憑依(合体)を予約しました。`, "possess"); render();
  };
  document.getElementById('btn-summon').onclick = () => {
    uiState = 'IDLE'; document.getElementById('summon-panel').style.display = 'flex'; render();
  };
  document.getElementById('btn-cancel').onclick = cancelActions;
  document.getElementById('execute-btn').onclick = executeTurn;

  const board = document.getElementById('board');
  board.innerHTML = ''; 
  for (let y = 0; y < BOARD_SIZE; y++) {
    for (let x = 0; x < BOARD_SIZE; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.onclick = () => handleCellClick(x, y);
      board.appendChild(cell);
    }
  }

  gameData.units = JSON.parse(JSON.stringify(INITIAL_UNITS));
  mp = { player: 5, enemy: 5 }; // MP ➡ Luna
  planned = {}; plannedSummons = []; uiState = 'IDLE'; activeUnitId = null; unitCounter = INITIAL_UNITS.length;
  document.getElementById('result-overlay').style.display = 'none';
  logEl.innerHTML = "";
  addLog("月面防衛線に到着。戦闘シーケンスを開始します。", "sys");
  showScreen('screen-battle');
  render();
}

function setMode(mode) {
  if (!activeUnitId) return;
  uiState = mode; document.getElementById('summon-panel').style.display = 'none'; render();
}

function cancelActions() {
  if (activeUnitId && planned[activeUnitId]) planned[activeUnitId] = { move: null, attack: null, possess: false };
  plannedSummons = []; uiState = 'IDLE'; document.getElementById('summon-panel').style.display = 'none'; render();
}

function startSummon(templateId) {
  const template = SHIKIGAMI_MASTER.find(m => m.id === templateId);
  const currentReservedMP = plannedSummons.reduce((sum, s) => sum + s.cost, 0);
  if (mp.player - currentReservedMP < template.cost) {
    addLog(`[ERROR] Lunaが不足しています。(Require: ${template.cost})`, "sys"); return;
  }
  selectedSummonTemplate = templateId; uiState = 'SELECTING_SUMMON_TARGET';
  document.getElementById('unit-info').innerText = `> ${template.name} の展開座標を指定してください。`;
}

function handleCellClick(x, y) {
  const unit = gameData.units.find(u => u.x === x && u.y === y);

  switch (uiState) {
    case 'IDLE':
      if (unit) {
        if (unit.owner === 'enemy') {
           const stats = getEffectiveStats(unit);
           addLog(`Scan: ${unit.name} (HP:${unit.hp} / ATK:${stats.effAtk} / R:${stats.effReach} / Attr:${unit.element})`, "sys");
        } else {
           activeUnitId = unit.id; 
           document.getElementById('summon-panel').style.display = 'none';
           if (!planned[activeUnitId]) planned[activeUnitId] = { move: null, attack: null, possess: false };
        }
      }
      break;

    case 'SELECTING_MOVE':
      const uMove = gameData.units.find(u => u.id === activeUnitId);
      if (!uMove) { uiState = 'IDLE'; return; }
      
      if (Math.abs(uMove.x - x) <= 1 && Math.abs(uMove.y - y) <= 1) {
        planned[activeUnitId].move = { x, y }; 
        planned[activeUnitId].possess = false; 
        uiState = 'IDLE';
        
        if (planned[activeUnitId].attack) {
          const ax = planned[activeUnitId].attack.x; const ay = planned[activeUnitId].attack.y;
          const stats = getEffectiveStats(uMove);
          if (Math.abs(x - ax) > stats.effReach || Math.abs(y - ay) > stats.effReach) planned[activeUnitId].attack = null;
        }
        if (uMove.isLeader && uMove.owner === 'player') {
          plannedSummons = plannedSummons.filter(s => Math.abs(x - s.x) <= 1 && Math.abs(y - s.y) <= 1);
        }
      } else { 
        addLog(`[ERROR] 指定座標は移動範囲外です。`, "sys"); 
      }
      break;

    case 'SELECTING_ATTACK':
      const uAtk = gameData.units.find(u => u.id === activeUnitId);
      if (!uAtk) { uiState = 'IDLE'; return; }
      
      const origin = planned[activeUnitId].move || { x: uAtk.x, y: uAtk.y };
      const stats = getEffectiveStats(uAtk);
      if (Math.abs(origin.x - x) <= stats.effReach && Math.abs(origin.y - y) <= stats.effReach) {
        planned[activeUnitId].attack = { x, y }; 
        planned[activeUnitId].possess = false; 
        uiState = 'IDLE';
      } else { 
        addLog(`[ERROR] 指定座標は術の範囲外です。`, "sys"); 
      }
      break;

    case 'SELECTING_SUMMON_TARGET':
      const leader = gameData.units.find(u => u.isLeader && u.owner === 'player');
      const leaderOrigin = planned[leader.id]?.move || { x: leader.x, y: leader.y };
      
      if (Math.abs(leaderOrigin.x - x) <= 1 && Math.abs(leaderOrigin.y - y) <= 1) {
        const isProjectedOccupied = gameData.units.some(u => {
          const px = planned[u.id]?.move ? planned[u.id].move.x : u.x;
          const py = planned[u.id]?.move ? planned[u.id].move.y : u.y;
          return px === x && py === y && !planned[u.id]?.possess;
        });
        const alreadySummoned = plannedSummons.find(s => s.x === x && s.y === y);
        
        if (isProjectedOccupied || alreadySummoned) {
          addLog(`[ERROR] 対象セクタは占有予定です。`, "sys");
          return;
        }

        const template = SHIKIGAMI_MASTER.find(m => m.id === selectedSummonTemplate);
        plannedSummons.push({ templateId: selectedSummonTemplate, x: x, y: y, cost: template.cost });
        addLog(`[TASK] ${template.name} の展開シーケンスを予約しました。`);
        uiState = 'IDLE'; 
        document.getElementById('summon-panel').style.display = 'none';
      } else { 
        addLog(`[ERROR] 月姫周囲セクタ以外には展開できません。`, "sys"); 
      }
      break;
  }
  render();
}

function executeTurn() { planEnemyActionsAI(); setTimeout(resolveTurn, 400); }

function planEnemyActionsAI() {
  const enemies = gameData.units.filter(u => u.owner === 'enemy');
  const players = gameData.units.filter(u => u.owner === 'player');
  enemies.forEach(enemy => {
    if (!planned[enemy.id]) planned[enemy.id] = { move: null, attack: null };
    let closestPlayer = null; let minDistance = Infinity;
    players.forEach(p => {
      const dist = Math.max(Math.abs(p.x - enemy.x), Math.abs(p.y - enemy.y));
      if (dist < minDistance) { minDistance = dist; closestPlayer = p; }
    });
    if (!closestPlayer) return;
    if (minDistance <= enemy.reach) {
      planned[enemy.id].attack = { x: closestPlayer.x, y: closestPlayer.y };
    } else {
      const dx = Math.sign(closestPlayer.x - enemy.x);
      const dy = Math.sign(closestPlayer.y - enemy.y);
      const targetX = enemy.x + dx; const targetY = enemy.y + dy;
      const isOccupied = gameData.units.find(u => u.x === targetX && u.y === targetY);
      if (!isOccupied) planned[enemy.id].move = { x: targetX, y: targetY };
    }
  });
}

function calculateManaGain(unit, prevX, prevY) {
  let gainedMP = 0;
  if (unit.x !== prevX || unit.y !== prevY) gainedMP += GAME_CONFIG.LUNA_REWARD.move;
  const isNearEnemy = gameData.units.some(other => 
    other.owner !== unit.owner && Math.abs(other.x - unit.x) <= 1 && Math.abs(other.y - unit.y) <= 1
  );
  if (isNearEnemy) gainedMP += GAME_CONFIG.LUNA_REWARD.risk_zone;
  return gainedMP;
}

// 完全版カスケード衝突判定ロジック (レトロRPG風ログ)
function resolveTurn() {
  addLog("--- BATCH PROCESS START ---", "sys");
  gameData.units.forEach(u => { u.buffAtk = 0; });

  // ① 衝突判定
  let collidedUnitIds = new Set();
  let resolving = true;
  let loopCount = 0;

  while (resolving && loopCount < 10) {
    resolving = false;
    let projected = {};
    
    gameData.units.forEach(u => {
      const px = planned[u.id]?.move ? planned[u.id].move.x : u.x;
      const py = planned[u.id]?.move ? planned[u.id].move.y : u.y;
      const key = `${px},${py}`;
      if (!projected[key]) projected[key] = [];
      projected[key].push(u.id);
    });

    for (const [key, unitIds] of Object.entries(projected)) {
      if (unitIds.length > 1) {
        unitIds.forEach(id => {
          if (planned[id]?.move) {
            planned[id].move = null; 
            resolving = true; 
          }
          collidedUnitIds.add(id);
        });
      }
    }

    gameData.units.forEach(u1 => {
      if (planned[u1.id]?.move) {
        const destX = planned[u1.id].move.x;
        const destY = planned[u1.id].move.y;
        const u2 = gameData.units.find(u => u.x === destX && u.y === destY);
        if (u2 && planned[u2.id]?.move && planned[u2.id].move.x === u1.x && planned[u2.id].move.y === u1.y) {
          planned[u1.id].move = null;
          planned[u2.id].move = null;
          collidedUnitIds.add(u1.id);
          collidedUnitIds.add(u2.id);
          resolving = true;
        }
      }
    });
    loopCount++;
  }

  if (collidedUnitIds.size > 0) {
    addLog(`[激突] プログラム同士の衝突を検知。`, "atk");
    collidedUnitIds.forEach(id => {
      const unit = gameData.units.find(u => u.id === id);
      if (unit) {
        unit.hp -= GAME_CONFIG.DAMAGE.collision;
        addLog(` ＞ ${getUnitLogName(unit)} に${GAME_CONFIG.DAMAGE.collision}の痛手!`, "atk");
      }
    });
  }

  // 呪力(Luna)獲得と最終移動の確定
  let turnMpGain = { player: GAME_CONFIG.LUNA_REWARD.turn_end, enemy: GAME_CONFIG.LUNA_REWARD.turn_end };
  gameData.units.forEach(u => {
    const prevX = u.x; const prevY = u.y;
    if (planned[u.id]?.move) { u.x = planned[u.id].move.x; u.y = planned[u.id].move.y; }
    const gain = calculateManaGain(u, prevX, prevY);
    if (gain > 0) turnMpGain[u.owner] += gain;
  });
  mp.player += turnMpGain.player; mp.enemy += turnMpGain.enemy; // MP ➡ Luna

  // ② 憑依（合体/オーバーライド）
  gameData.units.forEach(u => {
    if (planned[u.id]?.possess && u.hp > 0) {
      const leader = gameData.units.find(l => l.isLeader && l.owner === u.owner);
      if (leader && leader.hp > 0) {
        const hpBonus = Math.max(1, Math.ceil(u.hp * 0.5));
        const atkBonus = Math.max(1, Math.ceil(u.atk * 0.5));
        leader.hp += hpBonus; leader.atk += atkBonus;
        leader.element = u.element; 

        let tenshoMsg = "";
        if (u.isTensho) {
          if (u.tenshoAbility === 'reach') { leader.reach += 1; tenshoMsg = " [SYSPATH: R+1]"; } 
          else if (u.tenshoAbility === 'atk_max') { leader.atk += 5; tenshoMsg = " [SYSPATH: ATK+5]"; }
          else if (u.tenshoAbility === 'hp') { leader.hp += 10; tenshoMsg = " [SYSPATH: HP+10]"; }
          else if (u.tenshoAbility === 'balance') { leader.atk += 2; leader.hp += 5; tenshoMsg = " [SYSPATH: ATK+2/HP+5]"; }
          else if (u.tenshoAbility === 'bruiser') { leader.atk += 3; leader.hp += 6; tenshoMsg = " [SYSPATH: ATK+3/HP+6]"; }
          else if (u.tenshoAbility === 'kijin') { leader.atk += 3; leader.hp += 5; tenshoMsg = " [SYSPATH: ATK+3/HP+5]"; }
        }

        addLog(`[SYNC] ${getUnitLogName(u)} が月姫と合体(上書き)。 (HP+${hpBonus} / ATK+${atkBonus} / Attr:${u.element})${tenshoMsg}`, "possess");
        u.hp = 0; 
      }
    }
  });

  // ③ 攻撃解決 (光術解決)
  gameData.units.forEach(u => {
    const atkPlot = planned[u.id]?.attack;
    if (!atkPlot) return;
    const target = gameData.units.find(t => t.x === atkPlot.x && t.y === atkPlot.y);
    
    if (target && target.id !== u.id && u.hp > 0 && !planned[u.id]?.possess) { 
      if (target.owner !== u.owner) {
        let dmg = u.atk + u.buffAtk; let msg = "";
        if (ELEMENT_WEAK[u.element] === target.element) {
          dmg = Math.floor(dmg * GAME_CONFIG.DAMAGE.weak_multiplier); msg = "(CRITICAL!)";
        } else if (ELEMENT_BOOST[u.element] === target.element) {
          dmg = Math.floor(dmg * GAME_CONFIG.DAMAGE.resist_multiplier); msg = "(RESIST...)";
        }
        target.hp -= dmg;
        addLog(`[光術] ${getUnitLogName(u)} -> ${getUnitLogName(target)} に ${dmg}ダメージ ${msg}`, "atk");
      } else {
        if (ELEMENT_BOOST[u.element] === target.element) {
          target.buffAtk += GAME_CONFIG.BUFF.atk_boost;
          addLog(`[BUFF] ${getUnitLogName(u)} -> ${getUnitLogName(target)} に相生バフ。(Next ATK+${GAME_CONFIG.BUFF.atk_boost})`, "heal");
        }
      }
    } else if (u.hp > 0 && !planned[u.id]?.possess) { 
      addLog(`[MISS] ${getUnitLogName(u)} のプロセスは空振りました。`); 
    }
  });

  // ④ 召喚解決
  plannedSummons.forEach(summon => {
    const isOccupied = gameData.units.find(u => u.x === summon.x && u.y === summon.y);
    const template = SHIKIGAMI_MASTER.find(m => m.id === summon.templateId);
    if (isOccupied) {
      addLog(`[ERROR] 展開対象セクタに別プロセスが存在します。`, "sys");
    } else {
      mp.player -= summon.cost; // MP ➡ Luna
      unitCounter++;
      gameData.units.push({
        id: `u_${unitCounter}`, name: template.name, owner: 'player', element: template.element,
        hp: template.hp, atk: template.atk, buffAtk: 0, reach: template.reach, 
        isTensho: template.isTensho, tenshoAbility: template.tenshoAbility,
        x: summon.x, y: summon.y
      });
      addLog(`[DEPLOY] 味方の${template.name} が起動しました。`, "heal");
    }
  });
  plannedSummons = [];

  let playerLeaderDead = false; let enemyLeaderDead = false;
  gameData.units = gameData.units.filter(u => {
    if (u.hp <= 0) {
      if (!planned[u.id]?.possess) addLog(`[KILL] ${getUnitLogName(u)} が完全停止。`, "atk");
      if (u.isLeader) {
        if (u.owner === 'player') playerLeaderDead = true;
        if (u.owner === 'enemy') enemyLeaderDead = true;
      }
      return false;
    }
    return true;
  });

  // ⑤ 状態のリセット
  planned = {}; 
  activeUnitId = null; 
  uiState = 'IDLE'; 
  render();

  if (playerLeaderDead || enemyLeaderDead) {
    let title = ""; let desc = ""; let color = "";
    if (playerLeaderDead && enemyLeaderDead) {
      title = "DRAW"; desc = "両陣営のコアが同時に停止しました。"; color = "#aaa";
    } else if (playerLeaderDead) {
      title = "GAME OVER"; desc = "月姫の光が失われました..."; color = "#ff1744";
    } else {
      title = "VICTORY"; desc = "データベースの防衛に成功しました！"; color = "#4caf50";
    }
    document.getElementById('result-title').innerText = title;
    document.getElementById('result-title').style.color = color;
    document.getElementById('result-desc').innerText = desc;
    document.getElementById('result-overlay').style.display = 'flex';
  }
}

function render() {
  const cells = document.querySelectorAll('.cell');
  cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });

  const currentReservedMP = plannedSummons.reduce((sum, s) => sum + s.cost, 0);
  document.getElementById('val-mp-player').innerText = mp.player - currentReservedMP; // MP ➡ Luna
  document.getElementById('val-mp-enemy').innerText = mp.enemy; // MP ➡ Luna

  if (uiState !== 'SELECTING_SUMMON_TARGET') {
    const activeUnit = gameData.units.find(u => u.id === activeUnitId);
    if (activeUnit) {
      const stats = getEffectiveStats(activeUnit);
      const atkText = stats.effAtk > activeUnit.atk ? `${stats.effAtk}(予測)` : stats.effAtk;
      const reachText = stats.effReach > activeUnit.reach ? `${stats.effReach}(予測)` : stats.effReach;
      
      document.getElementById('unit-info').innerText = `> TARGET: ${activeUnit.name} | ATK:${atkText} R:${reachText} Attr:${activeUnit.element}`;
      
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      if (uiState === 'SELECTING_MOVE') document.getElementById('btn-move').classList.add('active');
      if (uiState === 'SELECTING_ATTACK') document.getElementById('btn-attack').classList.add('active');
    } else {
      document.getElementById('unit-info').innerText = `> 待機中... 采配を下す月の仲間を選んでください。`;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    }
  }

  plannedSummons.forEach(s => {
    const idx = s.y * BOARD_SIZE + s.x;
    cells[idx].classList.add('summon-target');
  });

  gameData.units.forEach(u => {
    const idx = u.y * BOARD_SIZE + u.x;
    const div = document.createElement('div');
    let classes = `shikigami ${u.owner}`;
    if (u.id === activeUnitId) classes += ' selected';
    if (u.isLeader) classes += ' leader';
    if (u.buffAtk > 0) classes += ' buffed'; 
    if (planned[u.id]?.possess) classes += ' possessing';
    div.className = classes;
    
    const attrBadge = `<div class="attr-badge attr-${u.element}">${u.element}</div>`;
    const dispAtk = u.isLeader ? getEffectiveStats(u).effAtk : u.atk + u.buffAtk;
    
    div.innerHTML = `
      ${attrBadge}
      <div class="u-name">${u.name}</div>
      <div class="u-stats">A:${dispAtk} H:${u.hp}</div>
    `;
    cells[idx].appendChild(div);

    if (planned[u.id]?.move) cells[planned[u.id].move.y * BOARD_SIZE + planned[u.id].move.x].classList.add('move-target');
    if (planned[u.id]?.attack) cells[planned[u.id].attack.y * BOARD_SIZE + planned[u.id].attack.x].classList.add('attack-target');
  });
}

showScreen('screen-title');
